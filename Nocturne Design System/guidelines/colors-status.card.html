<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Status" subtitle="Danger, warning, and additional hues" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px 28px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .swatch { display: flex; align-items: center; gap: 10px; padding: 8px 16px 8px 10px; border-radius: var(--radius-md); background: var(--surface-1); border: 1px solid var(--border-subtle); }
  .dot { width: 26px; height: 26px; border-radius: 50%; flex: 0 0 auto; }
  .info { display: flex; flex-direction: column; gap: 1px; }
  .name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-body); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="swatch"><div class="dot" style="background:var(--rose-400)"></div><div class="info"><span class="name" style="color:var(--rose-400)">Danger</span><span class="hex">#fb7185</span></div></div>
  <div class="swatch"><div class="dot" style="background:var(--amber-400)"></div><div class="info"><span class="name" style="color:var(--amber-400)">Warning</span><span class="hex">#fbbf24</span></div></div>
  <div class="swatch"><div class="dot" style="background:var(--violet-400)"></div><div class="info"><span class="name" style="color:var(--violet-400)">Violet</span><span class="hex">#a78bfa</span></div></div>
  <div class="swatch"><div class="dot" style="background:var(--scrim)"></div><div class="info"><span class="name">Scrim</span><span class="hex">rgba 5,7,9 .66</span></div></div>
</body>
</html>
