<!-- @dsCard group="Colors" viewport="700x180" name="Semantic Colors" subtitle="Text, surface, border & status aliases" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 16px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .row { display: flex; gap: 8px; flex-direction: column; }
  .item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--surface-1); border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .dot { width: 20px; height: 20px; border-radius: 50%; flex: 0 0 auto; border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-body); font-size: 11px; color: var(--text-secondary); }
  .group-label { font-family: var(--font-body); font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="row">
      <div class="group-label">Text</div>
      <div class="item"><div class="dot" style="background:var(--text-primary)"></div><span class="name">primary</span></div>
      <div class="item"><div class="dot" style="background:var(--text-secondary)"></div><span class="name">secondary</span></div>
      <div class="item"><div class="dot" style="background:var(--text-tertiary)"></div><span class="name">tertiary</span></div>
      <div class="item"><div class="dot" style="background:var(--text-disabled)"></div><span class="name">disabled</span></div>
    </div>
    <div class="row">
      <div class="group-label">Surface</div>
      <div class="item"><div class="dot" style="background:var(--bg-app);border-color:var(--border-default)"></div><span class="name">bg-app</span></div>
      <div class="item"><div class="dot" style="background:var(--surface-1)"></div><span class="name">surface-1</span></div>
      <div class="item"><div class="dot" style="background:var(--surface-2)"></div><span class="name">surface-2</span></div>
      <div class="item"><div class="dot" style="background:var(--surface-3)"></div><span class="name">surface-3</span></div>
    </div>
    <div class="row">
      <div class="group-label">Border</div>
      <div class="item"><div class="dot" style="background:var(--border-subtle)"></div><span class="name">subtle</span></div>
      <div class="item"><div class="dot" style="background:var(--border-default)"></div><span class="name">default</span></div>
      <div class="item"><div class="dot" style="background:var(--border-strong)"></div><span class="name">strong</span></div>
      <div class="item"><div class="dot" style="background:var(--border-accent)"></div><span class="name">accent</span></div>
    </div>
    <div class="row">
      <div class="group-label">Status</div>
      <div class="item"><div class="dot" style="background:var(--accent)"></div><span class="name">accent</span></div>
      <div class="item"><div class="dot" style="background:var(--danger)"></div><span class="name">danger</span></div>
      <div class="item"><div class="dot" style="background:var(--warning)"></div><span class="name">warning</span></div>
      <div class="item"><div class="dot" style="background:var(--on-accent);border-color:var(--border-strong)"></div><span class="name">on-accent</span></div>
    </div>
  </div>
</body>
</html>
