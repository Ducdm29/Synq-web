<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Corner radius tokens" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 24px 28px; display: flex; gap: 16px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 64px; height: 64px; background: var(--surface-2); border: 1px solid var(--border-default); }
  .lbl { font-family: var(--font-body); font-size: 10px; color: var(--text-tertiary); text-align: center; }
  .val { font-family: var(--font-body); font-size: 9px; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">xs</div><div class="val">6px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm</div><div class="val">10px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md</div><div class="val">14px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg</div><div class="val">18px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl</div><div class="val">24px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lbl">2xl</div><div class="val">32px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div><div class="val">999px</div></div>
</body>
</html>
