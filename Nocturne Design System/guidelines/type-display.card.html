<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px 28px; display: flex; flex-direction: column; gap: 4px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-body); font-size: 10px; color: var(--text-tertiary); width: 72px; flex: 0 0 72px; letter-spacing: .08em; text-transform: uppercase; }
  .spec { font-family: var(--font-body); font-size: 10px; color: var(--ink-400); min-width: 100px; }
</style>
</head>
<body>
  <div class="row">
    <span class="tag">display</span>
    <span style="font-family:var(--font-display);font-size:var(--text-display);font-weight:700;color:var(--text-primary);letter-spacing:var(--tracking-tight);line-height:1">Nocturne</span>
    <span class="spec">Sora 700 · 40px · −0.02em</span>
  </div>
  <div class="row">
    <span class="tag">h1</span>
    <span style="font-family:var(--font-display);font-size:var(--text-h1);font-weight:600;color:var(--text-primary);letter-spacing:var(--tracking-tight)">Khám phá âm nhạc</span>
    <span class="spec">Sora 600 · 30px</span>
  </div>
  <div class="row">
    <span class="tag">h2</span>
    <span style="font-family:var(--font-display);font-size:var(--text-h2);font-weight:600;color:var(--text-primary);letter-spacing:var(--tracking-snug)">Playlist của tôi</span>
    <span class="spec">Sora 600 · 24px</span>
  </div>
  <div class="row">
    <span class="tag">h3</span>
    <span style="font-family:var(--font-display);font-size:var(--text-h3);font-weight:600;color:var(--text-primary)">Bài hát mới nhất</span>
    <span class="spec">Sora 600 · 20px</span>
  </div>
</body>
</html>
