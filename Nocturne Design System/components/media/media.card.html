<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px 24px; }
  .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .lbl { font-family: var(--font-body); font-size: 10px; color: var(--text-tertiary); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { AlbumCard } = window.NocturneDesignSystem_689054;

const COVERS = [
  "https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=300&q=80",
  "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=300&q=80",
  "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300&q=80",
];

function Card() {
  React.useEffect(() => { typeof lucide !== "undefined" && lucide.createIcons(); });
  return (
    <div>
      <div className="lbl">Albums · Artists · Playlists</div>
      <div className="row">
        <AlbumCard cover={COVERS[0]} title="Hoàng Hôn" subtitle="Vũ." size={148} />
        <AlbumCard cover={COVERS[1]} title="Chill Playlist" subtitle="128 bài hát" size={148} />
        <AlbumCard title="Indie Mix" subtitle="Nocturne" size={148} />
        <AlbumCard cover={COVERS[2]} title="Sơn Tùng M-TP" subtitle="Nghệ sĩ" size={148} circle />
        <AlbumCard title="Vũ." subtitle="Nghệ sĩ" size={148} circle />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
</script>
</body>
</html>
