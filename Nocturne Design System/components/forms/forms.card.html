<!-- @dsCard group="Components" viewport="700x240" name="Forms" subtitle="Input, Slider, Switch" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px 24px; }
  .section { margin-bottom: 20px; }
  .row { display: flex; align-items: center; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-body); font-size: 10px; color: var(--text-tertiary); letter-spacing: .1em; text-transform: uppercase; }
  .sw-row { display: flex; align-items: center; gap: 12px; }
  .sw-lbl { font-family: var(--font-body); font-size: var(--text-label); color: var(--text-secondary); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Slider, Switch } = window.NocturneDesignSystem_689054;

function Card() {
  const [q, setQ] = React.useState("");
  const [vol, setVol] = React.useState(0.7);
  const [seek, setSeek] = React.useState(0.38);
  const [sw1, setSw1] = React.useState(true);
  const [sw2, setSw2] = React.useState(false);
  React.useEffect(() => { typeof lucide !== "undefined" && lucide.createIcons(); });
  return (
    <div>
      <div className="section">
        <div className="lbl">Input</div>
        <div style={{display:"flex",gap:12,flexDirection:"column",marginTop:8}}>
          <Input variant="search" value={q} onChange={e=>setQ(e.target.value)} placeholder="Tìm bài hát, nghệ sĩ, album…" leadingIcon={<i data-lucide="search" style={{width:18,height:18}}></i>} />
          <Input placeholder="Tên playlist…" trailingIcon={<i data-lucide="edit-2" style={{width:16,height:16}}></i>} />
        </div>
      </div>
      <div className="section">
        <div className="lbl">Slider</div>
        <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:12}}>
          <Slider value={seek} onChange={setSeek} height={6} />
          <Slider value={vol} onChange={setVol} height={4} />
        </div>
      </div>
      <div className="section">
        <div className="lbl">Switch</div>
        <div className="row">
          <div className="sw-row"><Switch checked={sw1} onChange={setSw1} /><span className="sw-lbl">Gapless</span></div>
          <div className="sw-row"><Switch checked={sw2} onChange={setSw2} /><span className="sw-lbl">Crossfade</span></div>
          <div className="sw-row"><Switch checked disabled /><span className="sw-lbl" style={{color:"var(--text-disabled)"}}>Disabled</span></div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
</script>
</body>
</html>
