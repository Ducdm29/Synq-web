<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synq — What's New (Changelog)</title>
  <meta name="description" content="Release notes for Synq — the Hi-Res lossless music player. See what's new in every version and download the latest Android APK." />
  <link rel="canonical" href="https://synqstudio.cloud/changelog" />
  <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
  <link rel="stylesheet" href="/styles.css" />
  <script>if(!window.matchMedia||!window.matchMedia('(prefers-reduced-motion: reduce)').matches){document.documentElement.className+=' anim';}</script>
  <style>
    /* ── Changelog page ── */
    .cl-hero { margin-bottom: var(--space-8); }

    /* Latest download card */
    #latest-download {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-5);
      background: linear-gradient(135deg, var(--surface-2) 0%, var(--surface-1) 100%);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-xl);
      box-shadow: var(--glow-sm), var(--shadow-md);
      padding: var(--space-7) var(--space-8);
      margin-bottom: var(--space-5);
    }
    .dl-latest-badge {
      display: inline-block;
      font-size: var(--text-micro);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-overline);
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: var(--space-2);
    }
    #latest-download h2 {
      font-family: var(--font-display);
      font-size: var(--text-h2);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-tight);
      color: var(--text-primary);
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      flex-wrap: wrap;
    }
    .dl-latest-ver {
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      color: var(--accent);
      font-family: var(--font-body);
    }
    .dl-latest-meta {
      font-size: var(--text-caption);
      color: var(--text-tertiary);
      margin-top: var(--space-2);
    }
    .dl-latest-btn { flex-shrink: 0; }
    .dl-latest-btn svg { flex-shrink: 0; }

    #latest-hint {
      font-size: var(--text-caption);
      color: var(--text-tertiary);
      margin-bottom: var(--space-4);
    }
    #latest-hint a { color: var(--accent); }
    #latest-hint a:hover { text-decoration: underline; }

    .sideload-note {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      font-size: var(--text-caption);
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
      margin-bottom: var(--space-9);
    }
    .sideload-note svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; margin-top: 2px; }

    /* Timeline of releases */
    .cl-timeline-title {
      font-family: var(--font-display);
      font-size: var(--text-h3);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
      letter-spacing: var(--tracking-snug);
      margin-bottom: var(--space-6);
    }
    #changelog-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .rel-card {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm), var(--ring-top);
      padding: var(--space-6) var(--space-7);
      transition: border-color var(--dur-base) var(--ease-out),
                  transform var(--dur-base) var(--ease-out);
    }
    .rel-card:hover { border-color: var(--border-default); transform: translateY(-2px); }
    .rel-head {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
    }
    .rel-version {
      font-family: var(--font-display);
      font-size: var(--text-h3);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      letter-spacing: var(--tracking-tight);
    }
    .rel-latest {
      font-size: 10px;
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-on-accent);
      background: var(--accent);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      box-shadow: var(--glow-sm);
    }
    .rel-date {
      font-size: var(--text-caption);
      color: var(--text-tertiary);
    }
    .rel-platforms {
      margin-left: auto;
      font-size: var(--text-micro);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-tertiary);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
    }
    .rel-notes {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .rel-notes li {
      position: relative;
      padding-left: var(--space-5);
      color: var(--text-secondary);
      line-height: var(--leading-relaxed);
      font-size: var(--text-body);
    }
    .rel-notes li::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    @media (max-width: 600px) {
      #latest-download { padding: var(--space-6) var(--space-5); }
      .dl-latest-btn { width: 100%; justify-content: center; }
      .rel-card { padding: var(--space-5) var(--space-5); }
      .rel-platforms { margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- Ambient orbs -->
<div class="glow-orb glow-orb-1" aria-hidden="true"></div>
<div class="glow-orb glow-orb-2" aria-hidden="true"></div>

<div class="site-wrapper">

  <!-- ── Header ── -->
  <header class="site-header" role="banner">
    <div class="nav-inner">
      <a href="/" class="nav-logo" aria-label="Synq — Home">
        <svg width="36" height="36" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="lg1" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#5eead4" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle cx="60" cy="60" r="58" fill="#0a0d10"/>
          <circle cx="60" cy="60" r="46" fill="url(#lg1)"/>
          <path d="M60 18a42 42 0 1 0 30 71.5A34 34 0 0 1 60 18Z" fill="#5eead4"/>
          <path d="M52 48l22 12-22 12V48Z" fill="#0a0d10"/>
        </svg>
        <span class="nav-logo-text">Synq</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="/support" class="nav-link" data-i18n="nav.support">Support</a>
        <a href="/changelog" class="nav-link active" data-i18n="nav.changelog">What's New</a>
        <a href="/privacy" class="nav-link" data-i18n="nav.privacyShort">Privacy</a>
        <!-- Language toggle -->
        <div class="lang-toggle" aria-label="Language switcher">
          <button class="lang-btn active" data-lang="en" aria-label="English">EN</button>
          <button class="lang-btn" data-lang="vi" aria-label="Tiếng Việt">VI</button>
        </div>
      </nav>
    </div>
  </header>

  <main class="page-main" id="main-content">

    <!-- Hero -->
    <div class="page-hero cl-hero">
      <span class="eyebrow" data-i18n="cl.eyebrow">Release Notes</span>
      <h1 data-i18n="cl.heading">What's new in Synq</h1>
      <p class="subtitle" data-i18n="cl.subtitle">Every improvement, fix and new feature — and the latest build to download.</p>
    </div>

    <!-- Latest download (rendered by changelog.js) -->
    <div id="latest-download" aria-live="polite"><!-- injected --></div>
    <p id="latest-hint"><!-- injected --></p>

    <!-- Sideload note -->
    <div class="sideload-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span id="sideload-note"><!-- injected --></span>
    </div>

    <!-- Timeline -->
    <h2 class="cl-timeline-title" data-i18n="cl.history">Version history</h2>
    <div id="changelog-list"><!-- injected by changelog.js --></div>

  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <p class="footer-copy" data-i18n="footer.copy">© 2025 Synq. All rights reserved.</p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/support" data-i18n="footer.support">Support</a>
        <a href="/privacy" data-i18n="footer.privacy">Privacy Policy</a>
        <a href="/delete-account" data-i18n="footer.delete">Delete Account</a>
        <a href="mailto:support.synq@gmail.com" data-i18n="footer.contact">Contact</a>
      </nav>
    </div>
  </footer>

</div><!-- /site-wrapper -->

<script src="/i18n.js"></script>
<script src="/apk.js"></script>
<script src="/changelog.js"></script>
<script src="/enhance.js" defer></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
